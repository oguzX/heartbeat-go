version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: devpulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: devpulse
      POSTGRES_USER: devpulse
      POSTGRES_PASSWORD: devpulse
    ports:
      - "5432:5432"
    volumes:
      - devpulse_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U devpulse -d devpulse" ]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  devpulse_postgres_data:
